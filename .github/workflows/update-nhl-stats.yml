name: Update NHL Playoff Stats

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run NHL Script
        run: node scripts/update-nhl-playoff-stats.js

      - name: Commit CSV
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/stats-joueurs-auto.csv

          git commit -m "Update NHL stats" || echo "No changes"

          git push
